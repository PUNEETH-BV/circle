<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
        }
        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .pill-chip {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pill-chip.active {
            background-color: #3525cd;
            color: #ffffff;
            border-color: #3525cd;
        }
        .upload-circle-glow {
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed antialiased">
<!-- TopAppBar (Based on Shared Components) -->
<header class="fixed top-0 w-full z-50 bg-surface/70 glass-nav border-b border-border-low">
<div class="flex justify-between items-center px-margin-mobile h-16 max-w-container-max mx-auto">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md font-bold text-primary">Circle</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Step 2 of 2</span>
</div>
</header>
<main class="pt-24 pb-32 px-margin-mobile max-w-lg mx-auto">
<!-- Header Section -->
<section class="mb-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Complete your profile</h1>
<p class="font-body-md text-on-surface-variant">Tell us a bit about yourself.</p>
</section>
<!-- Profile Picture Upload -->
<section class="flex flex-col items-center mb-10 group">
<div class="relative w-32 h-32">
<div class="w-full h-full rounded-full overflow-hidden bg-surface-container-highest border-2 border-white upload-circle-glow ring-1 ring-border-low">
<img class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-500" data-alt="A minimalist studio portrait placeholder icon inside a circular frame. The aesthetic is clean and high-end, featuring soft lighting and a neutral grey background that complements a professional corporate modern UI. Subtle grain texture and soft diffused shadows create depth, evoking a sense of calm and organized professionalism consistent with an Indigo-themed brand." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAk460rRdIy9_GQxMKjtwbKNqd2-K3EPDdqJoyze1udplbFdnApTSq0CEBvkY_HMgG5ay3CBroqGRBmE-NnwyaXNC27CFzygImmoGlK_3caXizZ5IO8-v3-HJKSWsNn-4HFRE0l3orVDVHvNE5Yf0m7CFmuaoZIaQ6XTzqK72vNoBkHXVlmuTXFKYC6dJKQ50edlumIMOtCJLFQNvmVGTTSNeS5yoVGLbcyEA594k4WPEGcrBg5oUrjTMWgtgjJGliXT0tBWwOQw6BP"/>
</div>
<button class="absolute bottom-1 right-1 bg-primary text-white p-2 rounded-full shadow-lg active:scale-90 transition-all hover:bg-primary-container">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</div>
<p class="mt-4 font-label-md text-label-md text-primary font-bold">ADD PROFILE PHOTO</p>
</section>
<!-- Form Fields -->
<div class="space-y-8">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="job-title">JOB TITLE</label>
<input class="w-full h-14 px-4 rounded-xl bg-surface-subtle border border-border-low focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all placeholder:text-ink-muted font-body-md" id="job-title" placeholder="e.g. Senior Designer" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="company-name">COMPANY NAME</label>
<input class="w-full h-14 px-4 rounded-xl bg-surface-subtle border border-border-low focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all placeholder:text-ink-muted font-body-md" id="company-name" placeholder="e.g. Circle Tech Inc." type="text"/>
</div>
<!-- Interests Section -->
<div class="space-y-4 pt-4">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-on-surface-variant ml-1 uppercase">Interests</label>
<span class="font-label-md text-label-md text-ink-muted">Select all that apply</span>
</div>
<div class="flex flex-wrap gap-3">
<button class="pill-chip px-5 py-2.5 rounded-full border border-border-low bg-white text-on-surface-variant font-body-sm hover:border-primary-fixed hover:bg-surface-subtle active:scale-95" onclick="toggleChip(this)">Design</button>
<button class="pill-chip px-5 py-2.5 rounded-full border border-border-low bg-white text-on-surface-variant font-body-sm hover:border-primary-fixed hover:bg-surface-subtle active:scale-95" onclick="toggleChip(this)">Engineering</button>
<button class="pill-chip px-5 py-2.5 rounded-full border border-border-low bg-white text-on-surface-variant font-body-sm hover:border-primary-fixed hover:bg-surface-subtle active:scale-95" onclick="toggleChip(this)">Marketing</button>
<button class="pill-chip px-5 py-2.5 rounded-full border border-border-low bg-white text-on-surface-variant font-body-sm hover:border-primary-fixed hover:bg-surface-subtle active:scale-95" onclick="toggleChip(this)">Product</button>
<button class="pill-chip px-5 py-2.5 rounded-full border border-border-low bg-white text-on-surface-variant font-body-sm hover:border-primary-fixed hover:bg-surface-subtle active:scale-95" onclick="toggleChip(this)">Sales</button>
<button class="pill-chip px-5 py-2.5 rounded-full border border-border-low bg-white text-on-surface-variant font-body-sm hover:border-primary-fixed hover:bg-surface-subtle active:scale-95" onclick="toggleChip(this)">Operations</button>
</div>
</div>
</div>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 w-full p-margin-mobile bg-white/70 glass-nav border-t border-border-low">
<div class="max-w-lg mx-auto">
<button id="finish-setup-btn" class="w-full h-14 bg-primary text-white rounded-xl font-body-md font-bold hover:bg-primary-container active:scale-[0.98] transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                Finish Setup
                <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
<div class="mt-4 text-center">
<button id="skip-btn" class="text-ink-muted font-label-md text-label-md hover:text-on-surface transition-colors">SKIP FOR NOW</button>
</div>
</div>
</footer>
<script>
        function toggleChip(el) {
            el.classList.toggle('active');
            // Adding a small tactile response animation handled by Tailwind's active:scale-95
        }

        document.getElementById('finish-setup-btn').addEventListener('click', () => {
            window.location.href = 'dashboard.html';
        });

        document.getElementById('skip-btn').addEventListener('click', () => {
            window.location.href = 'dashboard.html';
        });

        // Micro-interaction: Subtle parallax on the background elements if any were added
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            // Future-proofing for decorative bg blobs
        });
    </script>
</body></html>
