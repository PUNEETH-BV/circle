<body class="bg-background text-on-surface antialiased min-h-screen dotted-background">
<!-- TopAppBar -->

<div class="flex justify-between items-center px-margin-mobile h-16 max-w-container-max mx-auto">
<button aria-label="Go back" class="active:scale-95 transition-transform duration-150 flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low">

<span class="font-headline-md text-headline-md font-bold text-primary">Circle</span>

</div>
</header>
<main class="pt-24 pb-12 px-margin-mobile flex flex-col items-center min-h-screen">
<div class="w-full max-w-md">
<!-- Hero Section -->
<div class="mb-10 text-center md:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2">Start your journey</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create an account to start collaborating.</p>
</div>
<!-- Main Signup Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(15,23,42,0.05)] border border-border-low p-8 mb-8">
<form class="space-y-6" id="signup-form">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="full_name">Full Name</label>
<input class="w-full h-14 px-4 bg-surface-subtle border border-border-low rounded-lg font-body-md text-body-md focus-ring transition-all placeholder:text-ink-muted" id="full_name" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full h-14 px-4 bg-surface-subtle border border-border-low rounded-lg font-body-md text-body-md focus-ring transition-all placeholder:text-ink-muted" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase tracking-wider" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-subtle border border-border-low rounded-lg font-body-md text-body-md focus-ring transition-all placeholder:text-ink-muted pr-12" id="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-on-primary font-body-md text-body-md font-semibold rounded-lg shadow-sm hover:brightness-110 active:scale-[0.98] transition-all duration-200 mt-4 flex items-center justify-center gap-2" type="submit">
                        Next
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-[1px] bg-border-low"></div>
<span class="px-4 font-label-md text-label-md text-on-surface-variant whitespace-nowrap">OR</span>
<div class="flex-grow h-[1px] bg-border-low"></div>
</div>
<!-- Social Signup -->
<button class="w-full h-14 bg-surface-container-lowest border border-border-low rounded-lg font-body-md text-body-md font-semibold text-on-surface flex items-center justify-center gap-3 hover:bg-surface-subtle active:scale-[0.98] transition-all duration-200" type="button">

                    Continue with Google

<span class="font-label-md text-label-md text-on-surface-variant">Verify</span>
</div>
</div>

<!-- Simple Feedback Tooltip (Interactive Logic) -->
<script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Interaction feedback
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                window.location.href = 'step2.html';
            }, 1200);
        });

        // Floating label/focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });
    </script>
